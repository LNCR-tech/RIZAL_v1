name: Aura CI/CD

on:
  push:
    branches:
      - aura_ci_cd
  pull_request:
    branches:
      - aura_ci_cd
  workflow_dispatch:

jobs:
  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create CI env file
        run: cp .env.example .env

      - name: Check for unresolved merge conflicts
        run: |
          if grep -R -n -E '^(<<<<<<<|>>>>>>>|=======$)' . \
            --exclude-dir=.git \
            --exclude='.env' \
            --exclude='.env.example' \
            --exclude='.env.production.example'; then
            echo "Unresolved merge conflict markers found."
            exit 1
          fi

      - name: Validate production compose
        run: docker compose -f docker-compose.prod.yml config --quiet

  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest httpx email-validator python-dotenv

      - name: Compile backend
        run: python -m compileall .

      - name: Run backend tests
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
          SECRET_KEY: ci-secret
          DATABASE_URL: sqlite:///./test.db
        run: |
          if [ -d app/tests ]; then
            pytest -q app/tests
          else
            echo "No backend tests found. Skipping."
          fi

  docker-build:
    name: Docker Build Smoke Test
    runs-on: ubuntu-latest
    needs:
      - validate-compose
      - backend-checks

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Create CI env file
        run: cp .env.example .env

      - name: Build production images
        run: docker compose -f docker-compose.prod.yml build

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: docker-build

    if: github.ref == 'refs/heads/aura_ci_cd' && github.event_name == 'push'

    steps:
      - name: Verify deploy secrets exist
        run: |
          test -n "${{ secrets.SERVER_HOST }}" || (echo "SERVER_HOST is missing" && exit 1)
          test -n "${{ secrets.SERVER_USER }}" || (echo "SERVER_USER is missing" && exit 1)
          test -n "${{ secrets.SERVER_PORT }}" || (echo "SERVER_PORT is missing" && exit 1)
          test -n "${{ secrets.SERVER_APP_DIR }}" || (echo "SERVER_APP_DIR is missing" && exit 1)
          test -n "${{ secrets.SERVER_SSH_KEY }}" || (echo "SERVER_SSH_KEY is missing" && exit 1)
          echo "All deploy secrets exist."

      - name: Deploy through SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e

            APP_DIR="${{ secrets.SERVER_APP_DIR }}"
            REPO_URL="https://github.com/LNCR-tech/RIZAL_v1.git"
            BRANCH="aura_ci_cd"

            if [ ! -d "$APP_DIR/.git" ]; then
              sudo mkdir -p "$(dirname "$APP_DIR")"
              sudo chown -R "$USER:$USER" "$(dirname "$APP_DIR")"
              git clone -b "$BRANCH" "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"

            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git reset --hard "origin/$BRANCH"

            if [ ! -f .env.production ]; then
              echo ".env.production is missing on the server."
              exit 1
            fi

            cp .env.production .env

            docker compose -f docker-compose.prod.yml config --quiet
            docker compose -f docker-compose.prod.yml up -d --build
            docker image prune -f

            docker ps
