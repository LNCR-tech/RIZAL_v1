name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"
  FRONTEND_DIR: frontend-web
  HEALTHCHECK_URL: http://18.142.190.113:8001/health
  ASSISTANT_HEALTHCHECK_URL: http://18.142.190.113:8500/health
  ASSISTANT_INTERNAL_HEALTHCHECK_URL: http://127.0.0.1:8500/health

jobs:
  test:
    name: Production Quality Gates
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Lint backend syntax-critical rules
        working-directory: backend
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run backend migrations in CI database
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE fastapi_db;"
          alembic upgrade head

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          FACE_SCAN_BYPASS_ALL: "true"
          EMAIL_TRANSPORT: disabled
        run: pytest tests/

  build:
    name: Build Production Containers
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare example environment for compose validation
        run: cp .env.production.example .env.production

      - name: Validate production compose file
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml config --quiet

      - name: Build backend and assistant production images
        run: docker compose --env-file .env.production.example -f docker-compose.prod.yml build migrate assistant

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Validate deployment secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          test -n "${SERVER_HOST}" || { echo "Missing SERVER_HOST GitHub secret."; exit 1; }
          test -n "${SERVER_USER}" || { echo "Missing SERVER_USER GitHub secret."; exit 1; }
          test -n "${SERVER_APP_DIR}" || { echo "Missing SERVER_APP_DIR GitHub secret."; exit 1; }
          test -n "${SERVER_SSH_KEY}" || { echo "Missing SERVER_SSH_KEY GitHub secret."; exit 1; }

      - name: Trust VPS host key
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${SERVER_PORT}" -H "${SERVER_HOST}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy backend and assistant
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          DEPLOY_DIR: ${{ secrets.SERVER_APP_DIR }}
          DEPLOY_BRANCH: main
          DEPLOY_SCOPE: backend-assistant
          DB_SERVICE: db
          HEALTHCHECK_URL: ${{ env.HEALTHCHECK_URL }}
          ASSISTANT_HEALTHCHECK_URL: ${{ env.ASSISTANT_HEALTHCHECK_URL }}
        run: |
          ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
            "DEPLOY_DIR='${DEPLOY_DIR}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' DEPLOY_SCOPE='${DEPLOY_SCOPE}' DB_SERVICE='${DB_SERVICE}' HEALTHCHECK_URL='${HEALTHCHECK_URL}' ASSISTANT_HEALTHCHECK_URL='${ASSISTANT_HEALTHCHECK_URL}' bash -s" \
            < ./deploy.sh

      - name: Verify backend health
        run: |
          for attempt in $(seq 1 30); do
            if curl -fsS --connect-timeout 5 --max-time 15 "${HEALTHCHECK_URL}"; then
              echo "Backend is healthy."
              exit 0
            fi
            echo "Waiting for backend health (${attempt}/30)..."
            sleep 5
          done
          echo "Backend health check failed."
          exit 1

      - name: Verify assistant health
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          for attempt in $(seq 1 30); do
            if ssh -p "${SERVER_PORT}" "${SERVER_USER}@${SERVER_HOST}" \
              "curl -fsS --connect-timeout 5 --max-time 15 '${ASSISTANT_INTERNAL_HEALTHCHECK_URL}'"; then
              echo "Assistant is healthy."
              exit 0
            fi
            echo "Waiting for assistant health (${attempt}/30)..."
            sleep 5
          done
          echo "Assistant health check failed."
          exit 1
