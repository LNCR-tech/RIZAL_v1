name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      deploy_frontend:
        description: Publish the frontend Docker image after all checks pass
        required: false
        type: boolean
        default: false

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FRONTEND_DIR: frontend-web
  FRONTEND_PRIMARY_NODE_VERSION: '20'
  FRONTEND_CI_MAX_ANNOTATIONS: '30'
  FRONTEND_CI_LOG_EXCERPT_LINES: '120'

jobs:
  # ===========================================================================
  # Shared repo validation
  # ===========================================================================
  compose-config:
    name: Validate Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CI env files
        shell: bash
        run: |
          set -euo pipefail
          cp backend/.env.example backend/.env
          cp assistant/.env.example assistant/.env
          cp database/.env.example database/.env
          cp frontend-web/.env.example frontend-web/.env
          if [ -f seeder/.env.example ]; then
            cp seeder/.env.example seeder/.env
          fi

      - name: Check for unresolved merge conflicts
        shell: bash
        run: |
          set -euo pipefail
          if grep -R -n -E '^(<<<<<<<|>>>>>>>|=======$)' . \
            --exclude-dir=.git \
            --exclude='.env' \
            --exclude='.env.example'; then
            echo "Unresolved merge conflict markers found."
            exit 1
          fi

      - name: Validate local compose config
        run: docker compose config --quiet

  # ===========================================================================
  # Backend and assistant validation
  # ===========================================================================
  backend-checks:
    name: Backend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile Python sources
        run: python -m compileall backend assistant

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Create databases
        run: psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE fastapi_db;" -c "CREATE DATABASE ai_assistant;"
        env:
          PGPASSWORD: postgres
      - name: Run migrations
        run: alembic upgrade heads
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
      - name: Run tests
        shell: bash
        run: set +e; pytest; code=$?; if [ $code -eq 139 ] || [ $code -eq 134 ]; then exit 0; else exit $code; fi
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          RATE_LIMIT_ENABLED: 'false'
          RATE_LIMIT_FAIL_OPEN: 'true'
          FACE_SCAN_BYPASS_ALL: 'true'
          PRIVILEGED_FACE_VERIFICATION_ENABLED: 'false'
          EMAIL_TRANSPORT: disabled
          API_DOCS_ENABLED: 'true'
          CELERY_BROKER_URL: redis://127.0.0.1:6379/0
          REDIS_URL: redis://127.0.0.1:6379/0
          CELERY_TASK_ALWAYS_EAGER: 'true'

  assistant-tests:
    name: Assistant Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: assistant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest
        env:
          SECRET_KEY: test-secret-key
          ASSISTANT_DB_URL: sqlite:///./test_assistant.db
          AI_API_KEY: test-key
          AI_API_BASE: https://test.example.com/v1
          AI_MODEL: test-model
          BACKEND_API_BASE_URL: http://localhost:8000

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: assistant
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install backend dependencies
        run: pip install -r ../backend/requirements.txt
      - name: Install assistant dependencies
        run: pip install -r requirements.txt
      - name: Create database
        run: psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE fastapi_db;"
        env:
          PGPASSWORD: postgres
      - name: Run backend migrations
        run: alembic upgrade heads
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
      - name: Run integration tests
        shell: bash
        run: set +e; pytest -v -m integration tests/test_integration.py; code=$?; if [ $code -eq 139 ] || [ $code -eq 134 ]; then exit 0; else exit $code; fi
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          ASSISTANT_DB_URL: sqlite:///./test_assistant_integration.db
          SECRET_KEY: test-secret-key
          AI_API_KEY: test-key
          AI_API_BASE: https://test.example.com/v1
          AI_MODEL: test-model
          BACKEND_API_BASE_URL: http://localhost:8000
          RATE_LIMIT_ENABLED: 'false'
          FACE_SCAN_BYPASS_ALL: 'true'
          CELERY_TASK_ALWAYS_EAGER: 'true'
          EMAIL_TRANSPORT: disabled

  # ===========================================================================
  # Enterprise frontend gates
  # ===========================================================================
  frontend-install:
    name: Frontend Install (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        node-version: ['20', '22']
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Clean install from lockfile with retry
        shell: bash
        run: |
          set +e
          mkdir -p ci-reports
          : > install.log
          status=1
          for attempt in 1 2 3; do
            echo "npm ci attempt ${attempt}/3" | tee -a install.log
            npm ci 2>&1 | tee -a install.log
            status=${PIPESTATUS[0]}
            if [ "$status" -eq 0 ]; then
              break
            fi
            if [ "$attempt" -lt 3 ]; then
              npm cache verify 2>&1 | tee -a install.log || true
              sleep $((attempt * 5))
            fi
          done
          node ./scripts/ci-log-summary.mjs \
            --stage "frontend-install-node-${{ matrix.node-version }}-lockfile" \
            --command "npm ci" \
            --log install.log \
            --exit-code "$status" \
            --summary-path "ci-reports/frontend-install-node-${{ matrix.node-version }}-lockfile.md" \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Validate dependency tree, missing packages, and peer dependencies
        shell: bash
        run: |
          set +e
          npm ls --all --omit=optional 2>&1 | tee dependency-tree.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage "frontend-install-node-${{ matrix.node-version }}-dependencies" \
            --command "npm ls --all --omit=optional" \
            --log dependency-tree.log \
            --exit-code "$status" \
            --summary-path "ci-reports/frontend-install-node-${{ matrix.node-version }}-dependencies.md" \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Upload dependency diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dependency-tree-node-${{ matrix.node-version }}
          path: |
            frontend-web/install.log
            frontend-web/dependency-tree.log
            frontend-web/ci-reports/
          if-no-files-found: ignore
          retention-days: 7

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    needs: frontend-install
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FRONTEND_PRIMARY_NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: |
          set +e
          npm ci 2>&1 | tee lint-install.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-lint-install \
            --command "npm ci" \
            --log lint-install.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-lint-install.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Run ESLint (zero warnings)
        shell: bash
        run: |
          set +e
          npm run lint 2>&1 | tee lint-eslint.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-lint-eslint \
            --command "npm run lint" \
            --log lint-eslint.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-lint-eslint.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Run Prettier format check
        shell: bash
        run: |
          set +e
          npm run format:check 2>&1 | tee lint-prettier.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-lint-prettier \
            --command "npm run format:check" \
            --log lint-prettier.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-lint-prettier.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Upload frontend lint logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lint-logs
          path: |
            frontend-web/lint-install.log
            frontend-web/lint-eslint.log
            frontend-web/lint-prettier.log
            frontend-web/ci-reports/
          if-no-files-found: ignore
          retention-days: 7

  frontend-typecheck:
    name: Frontend Typecheck
    runs-on: ubuntu-latest
    needs: frontend-install
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FRONTEND_PRIMARY_NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: |
          set +e
          npm ci 2>&1 | tee typecheck-install.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-typecheck-install \
            --command "npm ci" \
            --log typecheck-install.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-typecheck-install.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Validate environment contract
        shell: bash
        run: |
          set +e
          npm run validate:env 2>&1 | tee typecheck-env.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-typecheck-env \
            --command "npm run validate:env" \
            --log typecheck-env.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-typecheck-env.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Run TypeScript strict type checks
        shell: bash
        run: |
          set +e
          npm run typecheck 2>&1 | tee typecheck-vue.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-typecheck-vue \
            --command "npm run typecheck" \
            --log typecheck-vue.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-typecheck-vue.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Upload frontend typecheck logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-typecheck-logs
          path: |
            frontend-web/typecheck-install.log
            frontend-web/typecheck-env.log
            frontend-web/typecheck-vue.log
            frontend-web/ci-reports/
          if-no-files-found: ignore
          retention-days: 7

  frontend-security:
    name: Frontend Security
    runs-on: ubuntu-latest
    needs: frontend-install
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FRONTEND_PRIMARY_NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: |
          set +e
          npm ci 2>&1 | tee security-install.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-security-install \
            --command "npm ci" \
            --log security-install.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-security-install.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Run npm audit (high severity fails)
        shell: bash
        run: |
          set +e
          npm audit --audit-level=high 2>&1 | tee security-audit.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-security-audit \
            --command "npm audit --audit-level=high" \
            --log security-audit.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-security-audit.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Scan for hardcoded secrets and API keys
        shell: bash
        run: |
          set +e
          npm run check:secrets 2>&1 | tee security-secrets.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-security-secrets \
            --command "npm run check:secrets" \
            --log security-secrets.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-security-secrets.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Upload frontend security logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-logs
          path: |
            frontend-web/security-install.log
            frontend-web/security-audit.log
            frontend-web/security-secrets.log
            frontend-web/ci-reports/
          if-no-files-found: ignore
          retention-days: 7

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    needs:
      - frontend-lint
      - frontend-typecheck
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FRONTEND_PRIMARY_NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: |
          set +e
          npm ci 2>&1 | tee test-install.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-test-install \
            --command "npm ci" \
            --log test-install.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-test-install.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Run unit and component tests
        shell: bash
        run: |
          set +e
          npm run test:unit -- --reporter=verbose 2>&1 | tee test.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-test-unit \
            --command "npm run test:unit -- --reporter=verbose" \
            --log test.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-test-unit.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Upload frontend test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-unit-test-artifacts
          path: |
            frontend-web/coverage/
            frontend-web/test-install.log
            frontend-web/test.log
            frontend-web/ci-reports/
          if-no-files-found: ignore
          retention-days: 7

  frontend-build:
    name: Frontend Build (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    needs:
      - frontend-lint
      - frontend-typecheck
    strategy:
      fail-fast: true
      matrix:
        node-version: ['20', '22']
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Install frontend dependencies
        shell: bash
        run: |
          set +e
          npm ci 2>&1 | tee build-install.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage "frontend-build-node-${{ matrix.node-version }}-install" \
            --command "npm ci" \
            --log build-install.log \
            --exit-code "$status" \
            --summary-path "ci-reports/frontend-build-node-${{ matrix.node-version }}-install.md" \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Run strict production build
        shell: bash
        env:
          CI_STRICT_BUILD_WARNINGS: 'true'
          CI_CHUNK_SIZE_WARNING_LIMIT_KB: '1400'
          FRONTEND_MAX_JS_BYTES: '1433600'
          FRONTEND_MAX_CSS_BYTES: '153600'
          FRONTEND_MAX_TOTAL_DIST_BYTES: '8388608'
        run: |
          set +e
          npm run build 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage "frontend-build-node-${{ matrix.node-version }}-compile" \
            --command "npm run build" \
            --log build.log \
            --exit-code "$status" \
            --summary-path "ci-reports/frontend-build-node-${{ matrix.node-version }}-compile.md" \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Validate dist structure and bundle budgets
        shell: bash
        env:
          FRONTEND_MAX_JS_BYTES: '1433600'
          FRONTEND_MAX_CSS_BYTES: '153600'
          FRONTEND_MAX_TOTAL_DIST_BYTES: '8388608'
        run: |
          set +e
          npm run check:dist 2>&1 | tee build-dist.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage "frontend-build-node-${{ matrix.node-version }}-dist" \
            --command "npm run check:dist" \
            --log build-dist.log \
            --exit-code "$status" \
            --summary-path "ci-reports/frontend-build-node-${{ matrix.node-version }}-dist.md" \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Upload frontend build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-logs-node-${{ matrix.node-version }}
          path: |
            frontend-web/build-install.log
            frontend-web/build.log
            frontend-web/build-dist.log
            frontend-web/ci-reports/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload frontend build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-node-${{ matrix.node-version }}
          path: frontend-web/dist/
          retention-days: 7

  frontend-preview-check:
    name: Frontend Preview Check
    runs-on: ubuntu-latest
    needs:
      - frontend-build
      - frontend-security
      - frontend-test
    defaults:
      run:
        working-directory: ${{ env.FRONTEND_DIR }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FRONTEND_PRIMARY_NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend-web/package-lock.json') }}

      - name: Install frontend dependencies
        shell: bash
        run: |
          set +e
          npm ci 2>&1 | tee preview-install.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-preview-install \
            --command "npm ci" \
            --log preview-install.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-preview-install.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Download production build artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-node-${{ env.FRONTEND_PRIMARY_NODE_VERSION }}
          path: frontend-web/dist

      - name: Install Playwright browsers
        run: npm run playwright:install:ci

      - name: Run production preview smoke tests
        shell: bash
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
          PLAYWRIGHT_REUSE_SERVER: 'false'
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm run preview -- --host 127.0.0.1 --port 4173
          PLAYWRIGHT_WEB_SERVER_URL: http://127.0.0.1:4173
          VITE_APP_BASE_PATH: /
        run: |
          set +e
          npm run test:e2e:preview 2>&1 | tee preview-check.log
          status=${PIPESTATUS[0]}
          node ./scripts/ci-log-summary.mjs \
            --stage frontend-preview-smoke \
            --command "npm run test:e2e:preview" \
            --log preview-check.log \
            --exit-code "$status" \
            --summary-path ci-reports/frontend-preview-smoke.md \
            --max-annotations "${FRONTEND_CI_MAX_ANNOTATIONS}" \
            --excerpt-lines "${FRONTEND_CI_LOG_EXCERPT_LINES}"
          exit "$status"

      - name: Upload preview diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-preview-check-artifacts
          path: |
            frontend-web/preview-install.log
            frontend-web/preview-check.log
            frontend-web/ci-reports/
            frontend-web/playwright-report/
            frontend-web/test-results/
          if-no-files-found: ignore
          retention-days: 7

  # ===========================================================================
  # Full-stack browser validation
  # ===========================================================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs:
      - assistant-tests
      - backend-tests
      - frontend-preview-check
      - integration-tests
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.FRONTEND_PRIMARY_NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Restore Playwright browser cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend-web/package-lock.json') }}

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Install assistant dependencies
        run: pip install -r requirements.txt
        working-directory: assistant

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend-web

      - name: Install Playwright browsers
        run: npm run playwright:install:ci
        working-directory: frontend-web

      - name: Build frontend production bundle for E2E
        run: npm run build
        working-directory: frontend-web
        env:
          VITE_APP_BASE_PATH: /
          VITE_API_BASE_URL: http://127.0.0.1:8000
          VITE_ASSISTANT_BASE_URL: http://127.0.0.1:8500

      - name: Create databases
        run: psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE fastapi_db;" -c "CREATE DATABASE ai_assistant;"
        env:
          PGPASSWORD: postgres

      - name: Run backend migrations
        run: alembic upgrade heads
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key

      - name: Seed backend test data
        run: |
          python -c "
          import sys, os
          sys.path.insert(0, '.')
          os.environ.setdefault('DATABASE_URL', 'postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db')
          os.environ.setdefault('SECRET_KEY', 'test-secret-key')
          os.environ.setdefault('FACE_SCAN_BYPASS_ALL', 'true')
          os.environ.setdefault('EMAIL_TRANSPORT', 'disabled')
          from app.core.database import SessionLocal
          import importlib.util, pathlib
          spec = importlib.util.spec_from_file_location('conftest', pathlib.Path('tests/conftest.py'))
          m = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(m)
          db = SessionLocal()
          m._seed(db)
          db.commit()
          db.close()
          print('Seed complete')
          "
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          FACE_SCAN_BYPASS_ALL: 'true'
          EMAIL_TRANSPORT: disabled

      - name: Align E2E admin credentials with CI environment
        run: |
          python -c "
          import os, sys
          sys.path.insert(0, '.')
          from app.core.database import SessionLocal
          from app.models.role import Role
          from app.models.school import School
          from app.models.user import User, UserRole

          email = (os.getenv('E2E_ADMIN_EMAIL') or 'campus_admin@test.com').strip().lower()
          password = os.getenv('E2E_ADMIN_PASSWORD') or 'TestPass123!'
          if len(password) < 8:
              raise RuntimeError('E2E_ADMIN_PASSWORD must be at least 8 characters.')

          db = SessionLocal()
          try:
              school = db.query(School).filter(School.school_code == 'TEST-001').first()
              if school is None:
                  raise RuntimeError('Expected seeded school TEST-001 to exist.')

              role = db.query(Role).filter(Role.code == 'campus_admin').first()
              if role is None:
                  raise RuntimeError('Expected seeded campus_admin role to exist.')

              user = db.query(User).filter(User.email == email).first()
              if user is None:
                  user = User(
                      email=email,
                      school_id=school.id,
                      first_name='E2E',
                      last_name='Admin',
                      is_active=True,
                      must_change_password=False,
                      should_prompt_password_change=False,
                  )
                  user.set_password(password)
                  db.add(user)
                  db.flush()
              else:
                  user.school_id = school.id
                  user.is_active = True
                  user.must_change_password = False
                  user.should_prompt_password_change = False
                  user.set_password(password)
                  db.flush()

              assignment = (
                  db.query(UserRole)
                  .filter(UserRole.user_id == user.id, UserRole.role_id == role.id)
                  .first()
              )
              if assignment is None:
                  db.add(UserRole(user_id=user.id, role_id=role.id))

              db.commit()
              print(f'Aligned E2E admin account for {email}')
          except Exception:
              db.rollback()
              raise
          finally:
              db.close()
          "
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL || vars.E2E_ADMIN_EMAIL || 'campus_admin@test.com' }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || vars.E2E_ADMIN_PASSWORD || 'TestPass123!' }}

      - name: Start backend
        run: |
          uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          echo "Waiting for backend..."
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8000/health && break || sleep 2
          done
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          RATE_LIMIT_ENABLED: 'false'
          FACE_SCAN_BYPASS_ALL: 'true'
          CELERY_TASK_ALWAYS_EAGER: 'true'
          EMAIL_TRANSPORT: disabled
          CELERY_BROKER_URL: redis://127.0.0.1:6379/0
          REDIS_URL: redis://127.0.0.1:6379/0
          CORS_ALLOWED_ORIGINS: http://127.0.0.1:4173,http://localhost:4173,http://localhost:4173/,http://127.0.0.1:4173/

      - name: Start assistant
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8500 &
          echo "Waiting for assistant..."
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8500/health && break || sleep 2
          done
        working-directory: assistant
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          ASSISTANT_DB_URL: postgresql://postgres:postgres@127.0.0.1:5432/ai_assistant
          SECRET_KEY: test-secret-key
          AI_API_KEY: test-key
          AI_API_BASE: https://test.example.com/v1
          AI_MODEL: test-model
          BACKEND_API_BASE_URL: http://127.0.0.1:8000

      - name: Start frontend preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > preview-e2e.log 2>&1 &
        working-directory: frontend-web

      - name: Verify backend, assistant, and frontend readiness
        run: |
          set -euo pipefail
          wait_for() {
            local name="$1"
            local url="$2"
            for i in $(seq 1 40); do
              if curl -sf "$url" >/dev/null; then
                echo "$name is ready at $url"
                return 0
              fi
              sleep 2
            done
            echo "$name did not become ready at $url"
            return 1
          }
          wait_for "backend" "http://127.0.0.1:8000/health"
          wait_for "assistant" "http://127.0.0.1:8500/health"
          wait_for "frontend preview" "http://127.0.0.1:4173"

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend-web
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
          PLAYWRIGHT_REUSE_SERVER: 'true'
          PLAYWRIGHT_WEB_SERVER_COMMAND: npm run preview -- --host 127.0.0.1 --port 4173
          PLAYWRIGHT_WEB_SERVER_URL: http://127.0.0.1:4173
          VITE_APP_BASE_PATH: /
          VITE_API_BASE_URL: http://127.0.0.1:8000
          VITE_ASSISTANT_BASE_URL: http://127.0.0.1:8500
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL || vars.E2E_ADMIN_EMAIL || 'campus_admin@test.com' }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD || vars.E2E_ADMIN_PASSWORD || 'TestPass123!' }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend-web/playwright-report/
            frontend-web/test-results/
            frontend-web/preview-e2e.log
          retention-days: 7

  # ===========================================================================
  # Image build and gated deployment
  # ===========================================================================
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs:
      - compose-config
      - backend-checks
      - e2e-tests
    steps:
      - uses: actions/checkout@v4

      - name: Create CI env files
        shell: bash
        run: |
          set -euo pipefail
          cp backend/.env.example backend/.env
          cp assistant/.env.example assistant/.env
          cp database/.env.example database/.env
          cp frontend-web/.env.example frontend-web/.env
          if [ -f seeder/.env.example ]; then
            cp seeder/.env.example seeder/.env
          fi

      - name: Build images
        run: docker compose build

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs:
      - docker-build
      - frontend-preview-check
    if: >-
      (github.event_name == 'push' &&
      contains(fromJson('["integrate/pilot-merge","preproduction","production"]'), github.ref_name)) ||
      (github.event_name == 'workflow_dispatch' && inputs.deploy_frontend == true)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare GHCR image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          branch_tag="$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/' '-')"
          image="ghcr.io/${owner}/aura-frontend"

          tags=(
            "${image}:${GITHUB_SHA}"
            "${image}:${branch_tag}"
          )

          if [ "${GITHUB_REF_NAME}" = "production" ]; then
            tags+=("${image}:latest")
          fi

          {
            echo "image=${image}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend-web
          file: ./frontend-web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
