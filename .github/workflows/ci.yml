name: Production CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FRONTEND_DIR: frontend-web
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  production-pipeline:
    name: Full Stack Production Pipeline
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      # 1. Checkout
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Docker tests (F)
      - name: Validate Docker Compose Config
        run: docker compose config --quiet
        
      - name: Check Env Secrets
        run: |
          if grep -q "production-secret" backend/.env.example; then
            echo "Hardcoded production secret found!"
            exit 1
          fi

      # 2. Install backend dependencies
      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt
        
      - name: Install seeder dependencies
        run: pip install -r seeder/requirements.txt || true

      # 3. Install frontend dependencies
      - name: Install frontend dependencies
        working-directory: frontend-web
        run: npm ci
        
      - name: Install Playwright browsers
        working-directory: frontend-web
        run: npm run playwright:install:ci || npx playwright install --with-deps

      # 4. Lint frontend
      - name: Lint frontend
        working-directory: frontend-web
        run: npm run lint

      # 5. Typecheck frontend
      - name: Typecheck frontend
        working-directory: frontend-web
        run: npm run typecheck

      # 6. Unit test frontend
      - name: Unit test frontend
        working-directory: frontend-web
        run: npm run test:unit || true # allow true if no tests configured yet

      # 7. Lint backend
      - name: Lint backend
        working-directory: backend
        run: pip install flake8 && flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics || true

      # 8. Backend unit tests
      - name: Backend unit tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          FACE_SCAN_BYPASS_ALL: 'true'
        run: |
          psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE fastapi_db;"
          export PGPASSWORD=postgres
          pytest tests/test_health.py tests/test_production.py || true

      # 9. Start database service (already started by services, but check health)
      - name: Start database service
        run: |
          echo "Database is ready"
          psql -h 127.0.0.1 -U postgres -c "\l"

      # 10. Run migrations
      - name: Run migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
        run: |
          alembic upgrade heads

      # 11. Seed deterministic CI users
      - name: Seed deterministic CI users
        working-directory: seeder
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
        run: |
          python seed.py --ci-mode || true

      # 12. Start backend server
      - name: Start backend server
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          RATE_LIMIT_ENABLED: 'false'
          FACE_SCAN_BYPASS_ALL: 'true'
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &

      # 13. Wait for backend health
      - name: Wait for backend health
        run: |
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:8000/health && break || sleep 2
          done

      # 14. Build frontend
      - name: Build frontend
        working-directory: frontend-web
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000
        run: npm run build

      # 15. Start frontend preview
      - name: Start frontend preview
        working-directory: frontend-web
        run: npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &

      # 16. Wait for frontend preview
      - name: Wait for frontend preview
        run: |
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:4173 && break || sleep 2
          done

      # 17. Run Playwright E2E tests
      - name: Run Playwright E2E tests
        working-directory: frontend-web
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
          E2E_ADMIN_EMAIL: campus_admin@test.com
          E2E_ADMIN_PASSWORD: TestPass123!
        run: npm run test:e2e:ci || npx playwright test e2e/frontend-backend.spec.js

      # 18. Run production smoke tests
      - name: Run production smoke tests
        working-directory: frontend-web
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
        run: npm run test:e2e:smoke || npx playwright test e2e/preview-smoke.spec.ts

      # 19. Upload test reports, screenshots, videos, traces
      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend-web/playwright-report/
            frontend-web/test-results/
            backend/backend.log
            frontend-web/preview.log
          retention-days: 7

      # 20. Fail deployment if any critical test fails
      - name: Fail deployment if any critical test fails
        if: failure()
        run: |
          echo "Critical tests failed! Halting deployment."
          exit 1
