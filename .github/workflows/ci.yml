name: Continuous Integration

on:
  push:
    branches: [ "main", "develop", "feature/*", "integrate/pilot-merge" ]
  pull_request:
    branches: [ "main", "develop", "integrate/pilot-merge" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FRONTEND_DIR: frontend-web
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  security-audit:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Frontend Dependency Audit
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm audit --audit-level=high
      - name: Secret Scanning
        run: |
          if grep -rE "(api_key|password|secret)\s*=\s*['\"][^'\"]+['\"]" backend/app/; then
            echo "ERROR: Possible hardcoded secrets found in application code."
            exit 1
          fi

  backend-tests:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov
      - name: Lint with flake8
        working-directory: backend
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Database Setup & Migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE fastapi_db;"
          alembic upgrade head
      - name: Run Backend Tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          FACE_SCAN_BYPASS_ALL: 'true'
        run: pytest tests/ --cov=app --cov-report=xml
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 7

  frontend-tests:
    name: Frontend Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend-web/package-lock.json
      - name: Install dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci
      - name: Lint Frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run lint
      - name: Typecheck Frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run typecheck
      - name: Unit Tests
        working-directory: ${{ env.FRONTEND_DIR }}
        run: |
          if npm run test:unit --if-present; then
            echo "Unit tests passed."
          else
            exit $?
          fi

  e2e-tests:
    name: E2E Playwright
    needs: [backend-tests, frontend-tests]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install Backend Dependencies
        run: |
          pip install -r backend/requirements.txt
          
      - name: Install Frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Install Playwright
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npx playwright install --with-deps chromium

      - name: Start Database & Migrate
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          PGPASSWORD: postgres
        run: |
          psql -h 127.0.0.1 -U postgres -c "CREATE DATABASE fastapi_db;"
          alembic upgrade head

      - name: Seed DB
        working-directory: seeder
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
        run: python seed.py --ci-mode

      - name: Start Backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/fastapi_db
          SECRET_KEY: test-secret-key
          TEST_MODE: 'true'
          ENV: test
          FACE_SCAN_BYPASS_ALL: 'true'
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 > backend.log 2>&1 &
          for i in $(seq 1 20); do curl -sf http://127.0.0.1:8000/health && break || sleep 2; done

      - name: Build & Start Frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          VITE_API_BASE_URL: http://127.0.0.1:8000
        run: |
          npm run build
          npm run preview -- --host 127.0.0.1 --port 4173 > preview.log 2>&1 &
          for i in $(seq 1 20); do curl -sf http://127.0.0.1:4173 && break || sleep 2; done

      - name: Run E2E Tests (Fail on Console Errors)
        working-directory: ${{ env.FRONTEND_DIR }}
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:4173
          PLAYWRIGHT_REUSE_SERVER: 'true'
          PLAYWRIGHT_WORKERS: '1'
          PLAYWRIGHT_TEST_DELAY_MS: '400'
          PLAYWRIGHT_SLOW_MO_MS: '75'
          PLAYWRIGHT_REQUIRE_BACKEND: 'true'
          PLAYWRIGHT_BACKEND_BASE_URL: http://127.0.0.1:8000
          PLAYWRIGHT_BACKEND_HEALTH_URL: http://127.0.0.1:8000/
          E2E_ADMIN_EMAIL: campus_admin@test.com
          E2E_ADMIN_PASSWORD: TestPass123!
          FAIL_ON_CONSOLE_ERROR: 'true'
        run: npx playwright test

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-results
          path: |
            ${{ env.FRONTEND_DIR }}/playwright-report/
            ${{ env.FRONTEND_DIR }}/test-results/
            backend/backend.log
            ${{ env.FRONTEND_DIR }}/preview.log
          retention-days: 7

  docker-build-test:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose Config
        run: docker compose config --quiet
      - name: Build Docker Images
        run: docker compose build
