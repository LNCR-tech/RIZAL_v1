#
# NOTE:
# This must be a top-level `x-...` extension field (not a service), otherwise Compose/Bake
# will treat it as a real build target and attempt to export the same image tag multiple
# times in parallel (leading to: `image "...:dev" already exists`).
#
x-backend-image: &backend_image
  image: aura_refractored-backend:dev

services:

  db:
    image: postgres:15
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fastapi_db
    ports:
      # Expose Postgres on 5433 to avoid conflicts with any local Windows PostgreSQL service.
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fastapi_db"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: valid8-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: valid8-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

  migrate:
    <<: *backend_image
    container_name: backend_migrate_v2
    command: sh /app/scripts/run-service.sh
    environment:
      - SERVICE_MODE=migrate
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db
    volumes:
      - ./Backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed:
    <<: *backend_image
    container_name: backend_seed_v2
    command: python seed.py
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db
      # Deterministic dev bootstrap credentials (override as needed).
      - DEFAULT_SCHOOL_NAME=${DEFAULT_SCHOOL_NAME:-Aurora University}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@yourdomain.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-AdminPass123!}
      # Keep local/dev login deterministic even if the user already exists (e.g., created by legacy migrations).
      - SEED_ADMIN_RESET_PASSWORD=${SEED_ADMIN_RESET_PASSWORD:-true}
    volumes:
      - ./Backend:/app
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: "no"

  backend:
    <<: *backend_image
    # Build the backend image once. Other backend-adjacent services (worker/beat/migrate/seed)
    # reference the same image tag without building to avoid parallel export conflicts and
    # duplicated heavy dependency installs.
    build: ./Backend
    container_name: backend_v2
    ports:
      - "8000:8000"
    command: sh /app/scripts/run-service.sh
    environment:
      - SERVICE_MODE=web
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AUTH_ENABLE_MFA=false
      - ALLOW_LIVENESS_BYPASS_WHEN_MODEL_MISSING=false
      - LOGIN_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - EVENT_STATUS_SYNC_ENABLED=${EVENT_STATUS_SYNC_ENABLED:-true}
      - EVENT_STATUS_SYNC_INTERVAL_SECONDS=${EVENT_STATUS_SYNC_INTERVAL_SECONDS:-60}
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-false}
      # Must be a syntactically valid, non-special-use domain because backend validates it at startup.
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@example.com}
      - SCHOOL_LOGO_STORAGE_DIR=/tmp/valid8_school_logos
      - SCHOOL_LOGO_MAX_FILE_SIZE_MB=2
    volumes:
      - ./Backend:/app
      - import_storage:/tmp/valid8_imports
      - branding_storage:/tmp/valid8_school_logos
    restart: unless-stopped
    depends_on:
      seed:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  worker:
    <<: *backend_image
    container_name: backend_worker_v2
    command: sh /app/scripts/run-service.sh
    environment:
      - SERVICE_MODE=worker
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AUTH_ENABLE_MFA=false
      - ALLOW_LIVENESS_BYPASS_WHEN_MODEL_MISSING=false
      - LOGIN_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - EVENT_STATUS_SYNC_ENABLED=${EVENT_STATUS_SYNC_ENABLED:-true}
      - EVENT_STATUS_SYNC_INTERVAL_SECONDS=${EVENT_STATUS_SYNC_INTERVAL_SECONDS:-60}
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-false}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@example.com}
      - SCHOOL_LOGO_STORAGE_DIR=/tmp/valid8_school_logos
      - SCHOOL_LOGO_MAX_FILE_SIZE_MB=2
    volumes:
      - ./Backend:/app
      - import_storage:/tmp/valid8_imports
      - branding_storage:/tmp/valid8_school_logos
    restart: unless-stopped
    depends_on:
      seed:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  beat:
    <<: *backend_image
    container_name: backend_beat_v2
    command: sh /app/scripts/run-service.sh
    environment:
      - SERVICE_MODE=beat
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/fastapi_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - AUTH_ENABLE_MFA=false
      - ALLOW_LIVENESS_BYPASS_WHEN_MODEL_MISSING=false
      - LOGIN_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://127.0.0.1:5173
      - EVENT_STATUS_SYNC_ENABLED=${EVENT_STATUS_SYNC_ENABLED:-true}
      - EVENT_STATUS_SYNC_INTERVAL_SECONDS=${EVENT_STATUS_SYNC_INTERVAL_SECONDS:-60}
      - SMTP_HOST=${SMTP_HOST:-mailpit}
      - SMTP_PORT=${SMTP_PORT:-1025}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-false}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@example.com}
      - SCHOOL_LOGO_STORAGE_DIR=/tmp/valid8_school_logos
      - SCHOOL_LOGO_MAX_FILE_SIZE_MB=2
    volumes:
      - ./Backend:/app
      - import_storage:/tmp/valid8_imports
      - branding_storage:/tmp/valid8_school_logos
    restart: unless-stopped
    depends_on:
      seed:
        condition: service_completed_successfully
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_started

  frontend:
    build: ./Frontend
    container_name: frontend_v2
    ports:
      - "5173:5173"
    depends_on:
      - backend
    working_dir: /app
    volumes:
      - ./Frontend:/app
      - /app/node_modules
    command: sh /app/scripts/dev-entrypoint.sh
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
  import_storage:
  branding_storage:
