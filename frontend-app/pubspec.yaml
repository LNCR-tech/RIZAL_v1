name: aura_app
description: "Aura (RIZAL) — school attendance & governance. Flutter client for Android & iOS."
publish_to: "none"
version: 1.27.1+60

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State, routing, networking
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  device_preview: ^1.2.0   # phone-frame preview on web/desktop (debug only)

  # Utils
  intl: ^0.20.2
  collection: ^1.18.0

  # ── Phase 1 capabilities ──
  camera: ^0.11.0+2
  geolocator: ^13.0.1

  # ── Phase 3 capabilities ──
  file_picker: ^8.1.4
  table_calendar: ^3.2.0
  pdf: ^3.12.0
  printing: ^5.14.3
  csv: ^8.0.0
  excel: ^4.0.6
  share_plus: ^12.0.2
  path_provider: ^2.1.5
  flutter_map: ^8.3.0
  latlong2: ^0.9.1
  liquid_bottom_nav_bar: ^0.1.0
  liquid_glass_renderer:
    path: third_party/liquid_glass_renderer
  liquid_glass_widgets: ^0.12.3
  flutter_local_notifications: ^21.0.0
  native_geofence: ^1.2.2

  # Google OAuth sign-in. Needs AURA_GOOGLE_WEB_CLIENT_ID at run-time and
  # native config (google-services.json on Android, GoogleService-Info.plist
  # on iOS) for production; falls back to a clear error on web when the
  # client ID isn't set so the feature degrades gracefully.
  google_sign_in: ^6.2.2

  # ── Later phases (uncomment when implementing; need native setup) ──
  # google_mlkit_face_detection: ^0.12.0   # on-device face framing/liveness cue
  # flutter_local_notifications: ^17.2.4
  # hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logos/
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope.ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono.ttf
